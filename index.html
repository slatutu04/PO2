<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QualiScan 3000</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container" id="main-card">
        <h1>QualiScan 3000</h1>
        <p class="subtitle">Scanner de Qualidade da Fábrica - IA Edition</p>

        <!-- NOVO: Área do Jogo -->
        <div class="game-area">
            <div class="stats-bar">
                <div class="stat">Pontos: <span id="score">0</span></div>
                <div id="stars-container"></div>
                <div class="stat">Eficiência: <span id="efficiency">100</span>%</div>
            </div>
            <canvas id="gameCanvas" width="600" height="150"></canvas>
        </div>

        <div id="webcam-container">
            <div class="loading-overlay" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p style="margin-top: 1rem; font-size: 0.8rem;">Carregando...</p>
            </div>
        </div>

        <div class="prediction-box">
            <div id="label-container">Escolha um modo abaixo:</div>
            <div class="progress-wrapper">
                <div id="confidence-bar"></div>
            </div>
            <div class="status-badge" id="status-text">Status: Aguardando</div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
            <button id="keyboard-btn" onclick="initKeyboardMode()" style="background: #38bdf8; color: white;">JOGAR COM TECLADO (Espaço)</button>
            <button id="start-btn" onclick="init()" style="background: #6366f1;">Iniciar com Webcam (IA)</button>
        </div>
    </div>

    <!-- Bibliotecas -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
